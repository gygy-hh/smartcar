# ============================================================
# 以下为硬件配置，供 car_main.py 导入使用
# ============================================================
#
# 通用字段说明：
#   wbt_car  - 车型版本号，用于标识小车硬件型号
#
# camera - 摄像头配置
#   front  - 前视摄像头编号（对应视频捕获通道）
#   side   - 侧视摄像头编号
#
# io - 通用 IO 引脚配置（WhalesBot 主板引脚编号） 
#   left_sensor  - 左侧传感器引脚（用于检测左侧障碍物或边界）, 2026年未使用，预留接口
#   right_sensor - 右侧传感器引脚（用于检测右侧障碍物或边界），2026年未使用，预留接口
#   key         - 按键引脚（用于物理按键输入）
#   light       - 灯光控制引脚（控制车灯或其他指示灯），2026年未使用，预留接口
#
# speed - 速度限制配置
#   x     - 横向（左右）速度限制，单位：m/s
#   y     - 纵向（前后）速度限制，单位：m/s
#   angle - 角速度限制，单位：rad/s
#
# ============================================================

wbt_car: 0.1
camera:
  front: 1
  side: 2
io:
  left_sensor: 8
  right_sensor: 7
  key: 1
  light: 2
speed:
  x:
    limit: 0.7
  y:
    limit: 0.7
  angle:
    limit: 3

# ============================================================
# PID 参数配置，供 car_main.py 导入使用
# ============================================================
#
# PID 通用字段说明：
#   Kp           - 比例系数，用于响应当前误差
#   Ki           - 积分系数，用于消除稳态误差
#   Kd           - 微分系数，用于抑制误差变化
#   setpoint     - 目标值（期望值）
#   output_limits - PID 输出限幅 [最小值, 最大值]
#
# ============================================================

# 巡线 PID - 用于车道线巡航控制
lane_pid:
  cfg_pid_y:
    Kp: 5
    Ki: 0.1
    Kd: 0
    setpoint: 0
    output_limits: [-0.7, 0.7]
  cfg_pid_angle:
    Kp: 3
    Ki: 0
    Kd: 0
    setpoint: 0
    output_limits: [-1.5, 1.5]

# 检测巡航 PID - 用于目标检测后的跟随控制
det_pid:
  cfg_pid_y:
    Kp: 1
    Ki: 0
    Kd: 0
    setpoint: 0
    output_limits: [-0.7, 0.7]
  cfg_pid_angle:
    Kp: 1
    Ki: 0
    Kd: 0
    setpoint: 0
    output_limits: [-1.5, 1.5]

# 定位 PID - 用于精确定位和位置控制
location_pid:
  pid_x:
    Kp: -2
    Ki: 0
    Kd: 0
    setpoint: 0
    output_limits: [-0.7, 0.7]
  pid_y:
    Kp: -2
    Ki: 0
    Kd: 0
    setpoint: 0
    output_limits: [-0.7, 0.7]


# ============================================================
# 以下为推理服务配置 文件，供 infer_back_end.py 和 infer_front.py 导入使用
# ============================================================
#
# 通用字段说明：
#   name        - 推理实例的唯一标识，供前端 ClintInterface 调用时使用
#   infer_type  - 推理类名，必须与 infer_wrap.py 中定义的类名一致
#                 可选值：YoloeInfer, YolovxInfer, YoloeRInfer, LaneInfer,
#                         HummanAtrr, MotHuman, OCRReco
#   model_dir   - 模型文件夹路径（相对于 infer_wrap.py 同级目录），
#                 文件夹内应包含 *.pdmodel 和 *.pdiparams 文件
#   port        - ZMQ 服务端口，前端通过该端口连接推理后端
#   img_size    - 输入图像缩放分辨率，Null 表示不缩放
#   run_mode    - 推理运行模式，可选值：
#                 paddle  - 使用 Paddle Inference CPU/GPU 原生推理
#                 trt_fp32 - TensorRT FP32 推理（需先导出 TensorRT 模型）
#                 trt_fp16 - TensorRT FP16 推理
#
# OCR 特殊说明：
#   OCR（OCRReco）采用两阶段模型架构，需要单独配置：
#     det_model_dir - 检测模型目录，用于定位图像中的文字区域
#     rec_model_dir - 识别模型目录，用于将检测到的文字区域识别为文本
#   img_size 对 OCR 无效，OCR 会自动对输入图像进行长边缩放
#
# ============================================================

infer_cfg:
  - name: lane
    infer_type: LaneInfer
    model_dir: lane_model
    port: 5001
    img_size: [128, 128]
    run_mode: paddle

  - name: task
    infer_type: YoloeInfer
    model_dir: task2026
    port: 5002
    img_size: [416, 416]
    run_mode: paddle

  - name: front
    infer_type: YoloeInfer
    model_dir: front_model2
    port: 5003
    img_size: [416, 416]
    run_mode: paddle

  - name: ocr
    infer_type: OCRReco
    # OCR 使用两阶段模型：检测(det) + 识别(rec)
    det_model_dir: ch_PP-OCRv3_det_infer
    rec_model_dir: ch_PP-OCRv3_rec_infer
    port: 5004
    img_size: Null
    run_mode: paddle

